name: Apply save migration v6 fix

on:
  push:
    branches:
      - fix/save-migration-v6-message
    paths:
      - .github/workflows/apply-save-v6-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/save-migration-v6-message
      - name: Update migration message and verify
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('source/main.cpp')
          text = path.read_text()
          old = 'saveMessage = loaded.migrated ? "Zapis zmigrowany do v4." : "Wczytano zapis.";'
          new = 'saveMessage = loaded.migrated ? "Zapis zmigrowany do v6." : "Wczytano zapis.";'
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one stale migration message, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          bash scripts/run_host_tests.sh
          rm .github/workflows/apply-save-v6-fix.yml
      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add source/main.cpp .github/workflows/apply-save-v6-fix.yml
          git commit -m "fix: report current save migration version"
          git push origin HEAD:fix/save-migration-v6-message
