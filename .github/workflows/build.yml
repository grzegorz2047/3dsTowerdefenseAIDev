name: Build

on:
  push:
    branches:
      - main
      - agent/**
      - publish-v*
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify bundled Nintendo 3DS toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          test -x "$DEVKITARM/bin/arm-none-eabi-g++"
          command -v picasso
          command -v git
          command -v python3

      - name: Build 3DSX and CIA
        id: build
        shell: bash
        run: |
          set -o pipefail
          make release -j2 2>&1 | tee build.log
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ "$GITHUB_REF" == refs/heads/publish-v* ]]; then
            tag="${GITHUB_REF_NAME#publish-}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Report build failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const source = fs.existsSync('build.log') ? 'build.log' : null;
            const log = source
              ? fs.readFileSync(source, 'utf8').trim().split('\n').slice(-100).join('\n')
              : 'Workflow failed before build.log was created.';
            const marker = '<!-- citadel-build-failure -->';
            const body = `${marker}\n## Build failure\n\nSource: \`${source ?? 'unknown'}\`\n\n\`\`\`text\n${log}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload playable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub pre-release
        if: steps.release.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
            docs/INSTALLATION.md
