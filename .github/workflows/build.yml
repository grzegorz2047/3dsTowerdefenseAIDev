name: Build

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-3dsx:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify bundled Nintendo 3DS toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          test -x "$DEVKITARM/bin/arm-none-eabi-g++"
          command -v picasso

      - name: Build 3DSX
        id: build
        shell: bash
        run: |
          set -o pipefail
          make -j2 2>&1 | tee build.log

      - name: Report build failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const source = fs.existsSync('build.log') ? 'build.log' : null;
            const log = source
              ? fs.readFileSync(source, 'utf8').trim().split('\n').slice(-80).join('\n')
              : 'Workflow failed before build.log was created.';
            const marker = '<!-- citadel-build-failure -->';
            const body = `${marker}\n## Build failure\n\nSource: \`${source ?? 'unknown'}\`\n\n\`\`\`text\n${log}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn

      - name: Prepare checksums
        run: make checksums

      - name: Upload development artifact
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-3dsx
          path: |
            dist/CitadelDefense3D.3dsx
            dist/SHA256SUMS.txt
          if-no-files-found: error
