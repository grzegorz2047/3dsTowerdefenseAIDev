name: Build

on:
  push:
    branches:
      - main
      - agent/**
      - publish-v*
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark-contract-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/finish-hardware-benchmark-contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finish-hardware-benchmark-contract
          fetch-depth: 0
      - name: Apply patch and run host tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_one(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1))

          replace_one(
              "source/main.cpp",
              "constexpr float kMaximumAccumulatorSeconds = kFixedStepSeconds * 5.0F;\n",
              "constexpr float kMaximumAccumulatorSeconds = kFixedStepSeconds * 5.0F;\n"
              "constexpr float kBenchmarkDurationSeconds = 30.0F;\n",
          )
          replace_one(
              "source/main.cpp",
              'state.objective = "Ustaw obciazenie, potem uruchom deterministyczny pomiar 12 s.";',
              'state.objective = "Ustaw obciazenie, potem uruchom deterministyczny pomiar 30 s.";',
          )
          replace_one(
              "source/main.cpp",
              "        if (input.pressed(KEY_START)) { action = MissionSessionAction::ExitApplication; break; }",
              "        if (input.pressed(KEY_START)) {\n"
              "            action = benchmarkConfig != nullptr ? MissionSessionAction::ReturnToCampaign :\n"
              "                MissionSessionAction::ExitApplication;\n"
              "            break;\n"
              "        }",
          )
          replace_one(
              "source/main.cpp",
              "        const bool benchmarkFinished = benchmarkConfig != nullptr && benchmarkElapsed >= 12.0F;",
              "        const bool benchmarkFinished = benchmarkConfig != nullptr &&\n"
              "            benchmarkElapsed >= kBenchmarkDurationSeconds;",
          )

          ui = Path("source/UiRenderer.cpp")
          text = ui.read_text()
          start_marker = "        if (state.benchmarkMode) {\n"
          end_marker = "        drawButton(8.0F, 190.0F, 144.0F, 42.0F, \"X KAMPANIA\", true);"
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit("source/UiRenderer.cpp: benchmark result block not found")
          block = '''        if (state.benchmarkMode) {
            C2D_DrawRectSolid(8.0F, 124.0F, 0.2F, 304.0F, 62.0F, kPanelStrong);
            const float currentFps = state.performance.lastFrameMilliseconds > 0.0F
                ? 1000.0F / state.performance.lastFrameMilliseconds : 0.0F;
            const float averageFps = state.performance.averageFrameMilliseconds > 0.0F
                ? 1000.0F / state.performance.averageFrameMilliseconds : 0.0F;
            const float worstFps = state.performance.worstFrameMilliseconds > 0.0F
                ? 1000.0F / state.performance.worstFrameMilliseconds : 0.0F;
            char result[112]{};
            std::snprintf(result, sizeof(result), "%s T30s FPS %.1f/%.1f/%.1f",
                BenchmarkProfiles::verdictName(state.benchmarkVerdict),
                currentFps, averageFps, worstFps);
            drawText(result, 12.0F, 130.0F, 0.40F,
                state.benchmarkVerdict == BenchmarkVerdict::Fail ? kDanger : kGold);
            std::snprintf(result, sizeof(result), "MS %.1f/%.1f/%.1f R %.1f MEM %luK",
                state.performance.lastFrameMilliseconds,
                state.performance.averageFrameMilliseconds,
                state.performance.worstFrameMilliseconds,
                state.performance.lastRenderMilliseconds,
                static_cast<unsigned long>(state.performance.freeLinearMemoryBytes / 1024U));
            drawText(result, 12.0F, 151.0F, 0.40F, kText);
            std::snprintf(result, sizeof(result), "E%zu T%zu P%zu D%u O%u MAP%u",
                state.activeEnemies, state.towerCount, state.activeProjectiles,
                static_cast<unsigned int>(state.benchmark.decorations),
                static_cast<unsigned int>(state.stereoEyeCount),
                static_cast<unsigned int>(state.benchmark.mapSize));
            drawText(result, 12.0F, 171.0F, 0.40F, kMuted);
        }
'''
          ui.write_text(text[:start] + block + text[end:])

          tests = Path("scripts/run_host_tests.sh")
          text = tests.read_text()
          marker = 'grep -q "configureBenchmark" "$ROOT/source/main.cpp"\n'
          addition = '''grep -q "kBenchmarkDurationSeconds = 30.0F" "$ROOT/source/main.cpp"
grep -q "benchmarkConfig != nullptr ? MissionSessionAction::ReturnToCampaign" "$ROOT/source/main.cpp"
grep -q '"%s T30s FPS %.1f/%.1f/%.1f"' "$ROOT/source/UiRenderer.cpp"
grep -q '"MS %.1f/%.1f/%.1f R %.1f MEM %luK"' "$ROOT/source/UiRenderer.cpp"
'''
          if text.count(marker) != 1:
              raise SystemExit("scripts/run_host_tests.sh: benchmark marker missing")
          tests.write_text(text.replace(marker, marker + addition, 1))
          PY
          bash scripts/run_host_tests.sh
      - name: Commit patch
        shell: bash
        run: |
          rm -f .agent-benchmark-trigger .github/workflows/agent-finish-benchmark.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add source/main.cpp source/UiRenderer.cpp scripts/run_host_tests.sh .agent-benchmark-trigger .github/workflows/agent-finish-benchmark.yml
          git commit -m "benchmark: finish physical-device result contract"
          git push origin HEAD:agent/finish-hardware-benchmark-contract

  build-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610
    steps:
      - uses: actions/checkout@v4
      - name: Verify toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          command -v picasso
          command -v python3
          command -v g++
      - name: Host tests
        shell: bash
        run: bash scripts/run_host_tests.sh
      - name: Build 3DSX and CIA
        shell: bash
        run: |
          set -o pipefail
          make release -j2 2>&1 | tee build.log
          cd dist && sha256sum -c SHA256SUMS.txt
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn
      - name: Upload playable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
          if-no-files-found: error

  azahar-smoke:
    name: Azahar smoke test
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: dist
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl jq xvfb libfuse2 libgl1 libopengl0 libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-xinerama0 libdbus-1-3
      - name: Download Azahar
        shell: bash
        run: |
          curl -fsSL "https://api.github.com/repos/azahar-emu/azahar/releases?per_page=10" > releases.json
          url=$(jq -r '[.[] | select(.draft == false) | .assets[] | select(.name | test("\\.AppImage$")) | select((.name | ascii_downcase | contains("wayland")) | not) | .browser_download_url][0]' releases.json)
          test "$url" != "null"
          curl -fL --retry 3 "$url" -o azahar.AppImage
          chmod +x azahar.AppImage
          ./azahar.AppImage --appimage-extract > azahar-extract.log 2>&1
          test -x squashfs-root/AppRun
      - name: Install CIA
        shell: bash
        run: |
          set -o pipefail
          mkdir -p azahar-home
          HOME="$PWD/azahar-home" timeout 90s xvfb-run -a ./squashfs-root/AppRun --install "$PWD/dist/CitadelDefense3D.cia" 2>&1 | tee azahar-cia-install.log
      - name: Launch 3DSX
        shell: bash
        run: |
          set +e
          HOME="$PWD/azahar-home" timeout 15s xvfb-run -a ./squashfs-root/AppRun -w "$PWD/dist/CitadelDefense3D.3dsx" > azahar-3dsx-launch.log 2>&1
          status=$?
          test $status -eq 124
      - name: Upload Azahar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-Azahar-logs
          path: azahar-*.log
          if-no-files-found: warn
