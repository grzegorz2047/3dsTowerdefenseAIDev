name: Build

on:
  push:
    branches:
      - agent/configurable-benchmark-lab
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/configurable-benchmark-lab
          fetch-depth: 0

      - name: Apply issue 157 integration
        id: migration
        continue-on-error: true
        shell: bash
        run: |
          python3 .github/scripts/issue157_runtime_patch.py > issue157-migration.log 2>&1
          status=$?
          if [[ $status -eq 0 ]]; then
            python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/build.yml')
          path.write_text('''name: Build

on:
  push:
    branches:
      - main
      - agent/**
      - publish-v*
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610
    steps:
      - uses: actions/checkout@v4
      - name: Verify toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          command -v picasso
          command -v python3
          command -v g++
      - name: Host tests
        shell: bash
        run: bash scripts/run_host_tests.sh
      - name: Build 3DSX and CIA
        shell: bash
        run: |
          set -o pipefail
          make release -j2 2>&1 | tee build.log
          cd dist && sha256sum -c SHA256SUMS.txt
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn
      - name: Upload playable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt

  azahar-smoke:
    name: Azahar smoke test
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: dist
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl jq xvfb libfuse2 libgl1 libopengl0 libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-xinerama0 libdbus-1-3
      - name: Download Azahar
        shell: bash
        run: |
          curl -fsSL "https://api.github.com/repos/azahar-emu/azahar/releases?per_page=10" > releases.json
          url=$(jq -r '[.[] | select(.draft == false) | .assets[] | select(.name | test("\\.AppImage$")) | select((.name | ascii_downcase | contains("wayland")) | not) | .browser_download_url][0]' releases.json)
          curl -fL --retry 3 "$url" -o azahar.AppImage
          chmod +x azahar.AppImage
          ./azahar.AppImage --appimage-extract > azahar-extract.log 2>&1
      - name: Install CIA
        run: |
          mkdir -p azahar-home
          HOME="$PWD/azahar-home" timeout 90s xvfb-run -a ./squashfs-root/AppRun --install "$PWD/dist/CitadelDefense3D.cia" 2>&1 | tee azahar-cia-install.log
      - name: Launch 3DSX
        shell: bash
        run: |
          set +e
          HOME="$PWD/azahar-home" timeout 15s xvfb-run -a ./squashfs-root/AppRun -w "$PWD/dist/CitadelDefense3D.3dsx" > azahar-3dsx-launch.log 2>&1
          test $? -eq 124
      - name: Upload Azahar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-Azahar-logs
          path: azahar-*.log
          if-no-files-found: warn
''')
          PY
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "Complete configurable benchmark laboratory"
            git push origin HEAD:agent/configurable-benchmark-lab
          fi
          exit $status

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue157-migration-log
          path: issue157-migration.log
          if-no-files-found: error

      - name: Fail when migration failed
        if: steps.migration.outcome == 'failure'
        run: exit 1
