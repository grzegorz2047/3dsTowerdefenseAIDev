name: Build

on:
  push:
    branches:
      - agent/configurable-benchmark-lab
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/configurable-benchmark-lab
          fetch-depth: 0
      - name: Apply renderer contract patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 .github/scripts/issue157_compile_fix.py > build.log 2>&1
          status=$?
          if [[ $status -eq 0 ]]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A >> build.log 2>&1
            git commit -m "Preserve renderer tower contract" >> build.log 2>&1
            git push origin HEAD:agent/configurable-benchmark-lab >> build.log 2>&1
            status=$?
          fi
          exit $status
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: error
      - name: Fail failed patch
        if: steps.patch.outcome == 'failure'
        run: exit 1
