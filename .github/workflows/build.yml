name: Build

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  build-3dsx:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nintendo 3DS toolchain packages
        run: dkp-pacman -Syu --noconfirm --needed 3ds-dev

      - name: Verify toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -x "$DEVKITARM/bin/arm-none-eabi-g++"
          command -v picasso

      - name: Build 3DSX
        run: make -j2

      - name: Prepare checksums
        run: make checksums

      - name: Upload development artifact
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-3dsx
          path: |
            dist/CitadelDefense3D.3dsx
            dist/SHA256SUMS.txt
          if-no-files-found: error
