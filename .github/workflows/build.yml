name: Build

on:
  push:
    branches:
      - main
      - agent/**
      - publish-v*
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-issue-185:
    name: Apply issue 185 product patch
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-185-mission-pause' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-185-mission-pause
          fetch-depth: 0
      - name: Apply deterministic transformation
        run: |
          set -euo pipefail
          python3 scripts/apply_issue_185.py
          rm -f .issue-185-trigger
          git checkout origin/main -- .github/workflows/build.yml
      - name: Commit product patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "gameplay: add deterministic mission pause"
          git push origin HEAD:agent/issue-185-mission-pause

  tower-balance:
    name: Tower balance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile balance contract
        run: |
          mkdir -p build/tower-balance
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Iinclude \
            tests/tower_balance_tests.cpp source/Enemy.cpp source/Level.cpp source/Tower.cpp \
            source/Projectile.cpp source/Wave.cpp -o build/tower-balance/tests
      - name: Verify representative kill times
        run: build/tower-balance/tests

  campaign-balance:
    name: Campaign balance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile campaign contract
        run: |
          mkdir -p build/campaign-balance
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Iinclude \
            tests/campaign_balance_tests.cpp source/Economy.cpp source/Enemy.cpp source/Level.cpp \
            -o build/campaign-balance/tests
      - name: Verify campaign pressure curve
        run: build/campaign-balance/tests "$GITHUB_WORKSPACE"

  build-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610
    steps:
      - uses: actions/checkout@v4
      - name: Verify toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          command -v picasso
          command -v python3
          command -v g++
      - name: Host tests
        shell: bash
        run: bash scripts/run_host_tests.sh
      - name: Build 3DSX and CIA
        shell: bash
        run: |
          set -o pipefail
          make release -j2 2>&1 | tee build.log
          cd dist && sha256sum -c SHA256SUMS.txt
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn
      - name: Upload playable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
          if-no-files-found: error

  azahar-smoke:
    name: Azahar smoke test
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: dist
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl jq xvfb libfuse2 libgl1 libopengl0 libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-xinerama0 libdbus-1-3
      - name: Download Azahar
        shell: bash
        run: |
          curl -fsSL "https://api.github.com/repos/azahar-emu/azahar/releases?per_page=10" > releases.json
          url=$(jq -r '[.[] | select(.draft == false) | .assets[] | select(.name | test("\\.AppImage$")) | select((.name | ascii_downcase | contains("wayland")) | not) | .browser_download_url][0]' releases.json)
          test "$url" != "null"
          curl -fL --retry 3 "$url" -o azahar.AppImage
          chmod +x azahar.AppImage
          ./azahar.AppImage --appimage-extract > azahar-extract.log 2>&1
          test -x squashfs-root/AppRun
      - name: Install CIA
        shell: bash
        run: |
          set -o pipefail
          mkdir -p azahar-home
          HOME="$PWD/azahar-home" timeout 90s xvfb-run -a ./squashfs-root/AppRun --install "$PWD/dist/CitadelDefense3D.cia" 2>&1 | tee azahar-cia-install.log
      - name: Launch 3DSX
        shell: bash
        run: |
          set +e
          HOME="$PWD/azahar-home" timeout 15s xvfb-run -a ./squashfs-root/AppRun -w "$PWD/dist/CitadelDefense3D.3dsx" > azahar-3dsx-launch.log 2>&1
          status=$?
          test $status -eq 124
      - name: Upload Azahar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-Azahar-logs
          path: azahar-*.log
          if-no-files-found: warn

  publish-release:
    name: Publish immutable alpha release
    if: github.event_name == 'push' && startsWith(github.ref_name, 'publish-v')
    needs:
      - tower-balance
      - campaign-balance
      - build-release
      - azahar-smoke
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: dist
      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#publish-}"
          test "$version" != "$GITHUB_REF_NAME"
          test -f "releases/$version.txt"
          if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag $version already exists; releases are immutable." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Verify release payload
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/CitadelDefense3D.cia
          test -s dist/CitadelDefense3D.3dsx
          test -s dist/SHA256SUMS.txt
          (cd dist && sha256sum -c SHA256SUMS.txt)
          test -s docs/INSTALLATION.md
      - name: Publish GitHub pre-release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          gh release create "$version" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$version" \
            --notes-file "releases/$version.txt" \
            --prerelease \
            dist/CitadelDefense3D.cia \
            dist/CitadelDefense3D.3dsx \
            dist/SHA256SUMS.txt \
            docs/INSTALLATION.md
