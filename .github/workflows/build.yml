name: Build

on:
  push:
    branches:
      - main
      - agent/**
      - publish-v*
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # BEGIN ISSUE 157 MIGRATION
      - name: Apply issue 157 runtime integration
        if: github.event_name == 'push' && github.ref_name == 'agent/configurable-benchmark-lab'
        shell: bash
        run: |
          if [[ -f .github/scripts/issue157_runtime_patch.py ]]; then
            python3 .github/scripts/issue157_runtime_patch.py
            python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/build.yml')
          text = path.read_text()
          start = text.index('      # BEGIN ISSUE 157 MIGRATION\n')
          end = text.index('      # END ISSUE 157 MIGRATION\n') + len('      # END ISSUE 157 MIGRATION\n')
          path.write_text(text[:start] + text[end:])
          PY
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "Complete configurable benchmark laboratory"
            git push origin HEAD:agent/configurable-benchmark-lab
          fi
      # END ISSUE 157 MIGRATION

      - name: Verify bundled Nintendo 3DS toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          test -x "$DEVKITARM/bin/arm-none-eabi-g++"
          command -v picasso
          command -v git
          command -v python3
          command -v g++

      - name: Run host gameplay tests
        shell: bash
        run: bash scripts/run_host_tests.sh

      - name: Build 3DSX and CIA
        shell: bash
        run: |
          set -o pipefail
          make release -j2 2>&1 | tee build.log
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload playable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
          if-no-files-found: error

  azahar-smoke:
    name: Azahar smoke test
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download playable artifacts
        uses: actions/download-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: dist

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl jq xvfb libfuse2 libgl1 libopengl0 libegl1 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libdbus-1-3

      - name: Download official Azahar AppImage
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/azahar-emu/azahar/releases?per_page=10" \
            > azahar-releases.json
          release=$(jq -c '[.[] | select(.draft == false) | . as $release | .assets[] | select(.name | test("\\.AppImage$")) | select((.name | ascii_downcase | contains("wayland")) | not) | {tag: $release.tag_name, name: .name, url: .browser_download_url}][0]' azahar-releases.json)
          test "$release" != "null"
          url=$(jq -r '.url' <<<"$release")
          curl -fL --retry 3 "$url" -o azahar.AppImage
          chmod +x azahar.AppImage

      - name: Extract Azahar AppImage
        shell: bash
        run: |
          ./azahar.AppImage --appimage-extract > azahar-extract.log 2>&1
          test -x squashfs-root/AppRun
          xvfb-run -a ./squashfs-root/AppRun -v | tee azahar-cli-version.txt

      - name: Verify CIA installation
        shell: bash
        run: |
          set -o pipefail
          mkdir -p azahar-home
          HOME="$PWD/azahar-home" timeout 90s xvfb-run -a ./squashfs-root/AppRun \
            --install "$PWD/dist/CitadelDefense3D.cia" 2>&1 | tee azahar-cia-install.log

      - name: Smoke test direct 3DSX launch
        shell: bash
        run: |
          set +e
          HOME="$PWD/azahar-home" timeout 15s xvfb-run -a ./squashfs-root/AppRun \
            -w "$PWD/dist/CitadelDefense3D.3dsx" > azahar-3dsx-launch.log 2>&1
          status=$?
          if [[ $status -ne 124 ]]; then
            cat azahar-3dsx-launch.log
            exit 1
          fi

      - name: Upload Azahar diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-Azahar-logs
          path: |
            azahar-*.txt
            azahar-*.log
            azahar-home
          if-no-files-found: warn
