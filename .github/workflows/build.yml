name: Build

on:
  push:
    branches:
      - main
      - agent/**
      - publish-v*
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify bundled Nintendo 3DS toolchain
        run: |
          test -f "$DEVKITARM/3ds_rules"
          test -f "$DEVKITPRO/libctru/include/3ds.h"
          test -f "$DEVKITPRO/libctru/lib/libctru.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro3d.a"
          test -f "$DEVKITPRO/libctru/lib/libcitro2d.a"
          test -x "$DEVKITARM/bin/arm-none-eabi-g++"
          command -v picasso
          command -v git
          command -v python3
          command -v g++

      - name: Run host gameplay tests
        shell: bash
        run: bash scripts/run_host_tests.sh

      - name: Build 3DSX and CIA
        id: build
        shell: bash
        run: |
          set -o pipefail
          make release -j2 2>&1 | tee build.log
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ "$GITHUB_REF" == refs/heads/publish-v* ]]; then
            tag="${GITHUB_REF_NAME#publish-}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Report build failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const source = fs.existsSync('build.log') ? 'build.log' : null;
            const log = source
              ? fs.readFileSync(source, 'utf8').trim().split('\n').slice(-100).join('\n')
              : 'Workflow failed before build.log was created. Check the host test step.';
            const marker = '<!-- citadel-build-failure -->';
            const body = `${marker}\n## Build failure\n\nSource: \`${source ?? 'host tests or setup'}\`\n\n\`\`\`text\n${log}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload playable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub pre-release
        if: steps.release.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/CitadelDefense3D.3dsx
            dist/CitadelDefense3D.cia
            dist/SHA256SUMS.txt
            docs/INSTALLATION.md

  azahar-smoke:
    name: Azahar smoke test
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download playable artifacts
        uses: actions/download-artifact@v4
        with:
          name: CitadelDefense3D-playable
          path: dist

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl jq xvfb libfuse2 libgl1 libegl1 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libdbus-1-3

      - name: Download official Azahar AppImage
        id: azahar
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/azahar-emu/azahar/releases?per_page=10" \
            > azahar-releases.json

          release=$(jq -c '[
            .[]
            | select(.draft == false)
            | . as $release
            | .assets[]
            | select(.name | test("\\.AppImage$"))
            | select((.name | ascii_downcase | contains("wayland")) | not)
            | {tag: $release.tag_name, name: .name, url: .browser_download_url}
          ][0]' azahar-releases.json)

          test "$release" != "null"
          tag=$(jq -r '.tag' <<<"$release")
          name=$(jq -r '.name' <<<"$release")
          url=$(jq -r '.url' <<<"$release")
          echo "Using Azahar $tag asset $name" | tee azahar-version.txt
          curl -fL --retry 3 "$url" -o azahar.AppImage
          chmod +x azahar.AppImage
          sha256sum azahar.AppImage | tee -a azahar-version.txt
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Extract Azahar AppImage
        shell: bash
        run: |
          ./azahar.AppImage --appimage-extract > azahar-extract.log 2>&1
          test -x squashfs-root/AppRun
          xvfb-run -a ./squashfs-root/AppRun --version | tee azahar-cli-version.txt

      - name: Verify CIA installation
        shell: bash
        run: |
          set -o pipefail
          mkdir -p azahar-home
          HOME="$PWD/azahar-home" \
            timeout 90s xvfb-run -a ./squashfs-root/AppRun \
            --install "$PWD/dist/CitadelDefense3D.cia" \
            2>&1 | tee azahar-cia-install.log

      - name: Smoke test direct 3DSX launch
        shell: bash
        run: |
          set +e
          HOME="$PWD/azahar-home" \
            timeout 15s xvfb-run -a ./squashfs-root/AppRun \
            --windowed "$PWD/dist/CitadelDefense3D.3dsx" \
            > azahar-3dsx-launch.log 2>&1
          status=$?
          echo "Azahar 3DSX exit status: $status" | tee azahar-smoke-result.txt

          if [[ $status -eq 124 ]]; then
            echo "PASS: application remained active for the smoke-test window" | tee -a azahar-smoke-result.txt
          else
            echo "FAIL: application or emulator exited before the smoke-test timeout" | tee -a azahar-smoke-result.txt
            exit 1
          fi

      - name: Collect Azahar logs
        if: always()
        shell: bash
        run: |
          mkdir -p azahar-logs
          cp -f azahar-*.txt azahar-*.log azahar-logs/ 2>/dev/null || true
          find azahar-home -type f \( -name 'azahar_log.txt' -o -name '*.log' \) \
            -exec cp --parents '{}' azahar-logs/ \; 2>/dev/null || true
          find azahar-logs -type f -maxdepth 8 -print

      - name: Upload Azahar diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CitadelDefense3D-Azahar-logs
          path: azahar-logs
          if-no-files-found: warn
