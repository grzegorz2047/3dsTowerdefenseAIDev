name: Run issue 187 generator

on:
  push:
    branches:
      - agent/issue-187-campaign-scenes
    paths:
      - .github/workflows/issue-187-runner.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20260610
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-187-campaign-scenes
      - name: Execute generator and tests
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /      - name: Generate source scenes and runtime art/ { found=1; next }
            found && /      - name: Commit generated scenes/ { exit }
            found && /        run: \|/ { in_run=1; next }
            in_run { sub(/^          /, ""); print }
          ' .github/workflows/issue-187-scenes.yml > /tmp/apply-issue-187.sh
          test -s /tmp/apply-issue-187.sh
          bash /tmp/apply-issue-187.sh
      - name: Commit generated result
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-187-scenes.yml .github/workflows/issue-187-runner.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Makefile assets romfs/scenes tests .github/workflows/issue-187-scenes.yml .github/workflows/issue-187-runner.yml
          git commit -m "art: decorate remaining campaign maps"
          git push origin HEAD:agent/issue-187-campaign-scenes
