name: Apply issue 187 campaign scenes

on:
  push:
    branches:
      - agent/issue-187-campaign-scenes
    paths:
      - .github/workflows/issue-187-scenes.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-187-campaign-scenes
      - name: Generate source scenes and runtime art
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations
          import json
          from pathlib import Path

          root = Path('.')
          scenes = root / 'assets' / 'scenes'
          runtime = root / 'romfs' / 'scenes'
          scenes.mkdir(parents=True, exist_ok=True)
          runtime.mkdir(parents=True, exist_ok=True)

          def obj(name, kind, group, order, x, z, scale=1.0, rotation=0.0):
              return {
                  'name': name,
                  'type': kind,
                  'group': group,
                  'order': order,
                  'location': [x, -z, 0.0],
                  'scale': [scale, scale, scale],
                  'rotation_euler_deg': [0.0, 0.0, -rotation],
              }

          def write_scene(level, objects):
              payload = {
                  'schema': 1,
                  'level': level,
                  'theme': 'VhalPass',
                  'coordinate_system': 'blender_z_up_minus_y_forward',
                  'objects': objects,
              }
              (scenes / f'{level}.scene.json').write_text(
                  json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          def import_art(level):
              objects = []
              group = 'environment'
              order = 10
              for raw in (runtime / f'{level}.art').read_text(encoding='utf-8').splitlines():
                  line = raw.strip()
                  if line.startswith('; ') and not line.startswith('; Citadel'):
                      group = line[2:]
                  elif line.startswith('prop='):
                      kind, x, z, scale, rotation = line[5:].split(',')
                      objects.append(obj(
                          f'{level}_{order:03d}_{kind.lower()}', kind, group, order,
                          float(x), float(z), float(scale), float(rotation)))
                      order += 10
              write_scene(level, objects)

          for legacy in ('flooded_road', 'iron_ravine', 'storm_ring'):
              import_art(legacy)

          write_scene('ash_gate', [
              obj('ash_spawn_cliff','Cliff','charred invasion gate',10,0.2,1.0,1.5,-8),
              obj('ash_spawn_ruin','Ruin','charred invasion gate',20,1.2,1.2,1.3,18),
              obj('ash_spawn_banner_a','Banner','charred invasion gate',30,2.1,1.0,0.9,-12),
              obj('ash_spawn_banner_b','Banner','charred invasion gate',40,3.0,1.1,0.8,10),
              obj('ash_barricade_a','Barricade','broken outer defenses',100,4.8,1.0,1.0,12),
              obj('ash_barricade_b','Barricade','broken outer defenses',110,6.2,1.0,0.9,-16),
              obj('ash_wagon','Wagon','broken outer defenses',120,7.5,1.2,0.9,28),
              obj('ash_rock_a','Rock','broken outer defenses',130,9.8,2.0,1.1,0),
              obj('ash_rock_b','Rock','ash field',200,10.0,5.0,0.8,0),
              obj('ash_rock_c','Rock','ash field',210,10.2,7.0,1.0,0),
              obj('ash_ruin_mid','Ruin','ash field',220,9.8,9.8,1.1,-22),
              obj('ash_pine_dead_a','Pine','ash field',230,1.0,8.8,0.9,0),
              obj('ash_pine_dead_b','Pine','ash field',240,1.3,10.0,1.1,0),
              obj('ash_watch_a','Watchtower','citadel approach',300,5.8,10.1,1.1,0),
              obj('ash_watch_b','Watchtower','citadel approach',310,8.5,10.0,1.0,0),
              obj('ash_citadel_banner','Banner','citadel approach',320,7.2,10.2,0.9,0),
              obj('ash_citadel_barricade','Barricade','citadel approach',330,6.8,9.2,0.9,0),
              obj('ash_citadel_cliff','Cliff','citadel approach',340,10.2,10.3,1.4,0),
          ])

          write_scene('ruined_village', [
              obj('village_gate_ruin','Ruin','collapsed village gate',10,0.3,0.8,1.3,-12),
              obj('village_gate_banner','Banner','collapsed village gate',20,1.5,0.6,0.8,15),
              obj('village_gate_barricade','Barricade','collapsed village gate',30,3.0,0.8,0.9,-8),
              obj('village_gate_rock','Rock','collapsed village gate',40,4.2,0.6,0.8,0),
              obj('village_square_ruin_a','Ruin','central ruined square',100,5.0,3.8,1.2,20),
              obj('village_square_ruin_b','Ruin','central ruined square',110,6.5,4.0,1.0,-28),
              obj('village_square_wagon_a','Wagon','central ruined square',120,5.3,5.8,0.9,34),
              obj('village_square_wagon_b','Wagon','central ruined square',130,7.0,6.0,0.8,-18),
              obj('village_square_banner','Banner','central ruined square',140,6.0,5.0,0.8,0),
              obj('village_homes_ruin','Ruin','shattered homes',200,9.9,6.8,1.1,18),
              obj('village_homes_barricade','Barricade','shattered homes',210,9.8,8.0,0.9,-14),
              obj('village_homes_pine','Pine','shattered homes',220,10.0,9.8,1.0,0),
              obj('village_homes_rock','Rock','shattered homes',230,8.4,10.0,0.9,0),
              obj('village_watch_a','Watchtower','final village defense',300,1.0,6.5,1.0,0),
              obj('village_watch_b','Watchtower','final village defense',310,1.0,9.5,1.1,0),
              obj('village_final_banner','Banner','final village defense',320,2.0,10.0,0.9,0),
              obj('village_final_cliff','Cliff','final village defense',330,4.8,10.2,1.4,8),
              obj('village_final_barricade','Barricade','final village defense',340,5.8,9.8,0.9,12),
          ])

          write_scene('stone_bridge', [
              obj('bridge_spawn_cliff_a','Cliff','northern ravine entrance',10,0.5,0.5,1.6,8),
              obj('bridge_spawn_cliff_b','Cliff','northern ravine entrance',20,4.2,0.4,1.4,-10),
              obj('bridge_spawn_ruin','Ruin','northern ravine entrance',30,5.5,1.0,1.0,18),
              obj('bridge_spawn_banner','Banner','northern ravine entrance',40,6.5,0.8,0.8,0),
              obj('bridge_pier_a','Watchtower','massive stone bridge',100,4.5,3.0,1.2,0),
              obj('bridge_pier_b','Watchtower','massive stone bridge',110,4.5,6.0,1.2,0),
              obj('bridge_arch_ruin_a','Ruin','massive stone bridge',120,6.0,4.2,1.2,26),
              obj('bridge_arch_ruin_b','Ruin','massive stone bridge',130,7.5,5.2,1.1,-24),
              obj('bridge_banner_a','Banner','massive stone bridge',140,5.2,4.5,0.9,0),
              obj('bridge_banner_b','Banner','massive stone bridge',150,5.2,6.5,0.9,0),
              obj('bridge_ravine_rock_a','Rock','ravine walls',200,9.8,2.0,1.2,0),
              obj('bridge_ravine_rock_b','Rock','ravine walls',210,10.0,4.8,0.9,0),
              obj('bridge_ravine_cliff','Cliff','ravine walls',220,10.1,7.0,1.5,12),
              obj('bridge_ravine_pine','Pine','ravine walls',230,9.8,9.8,1.0,0),
              obj('bridge_final_watch','Watchtower','southern bridgehead',300,1.0,10.0,1.1,0),
              obj('bridge_final_wagon','Wagon','southern bridgehead',310,4.5,9.8,0.9,-20),
              obj('bridge_final_barricade','Barricade','southern bridgehead',320,6.0,10.0,1.0,8),
              obj('bridge_final_banner','Banner','southern bridgehead',330,8.0,10.1,0.9,0),
          ])

          write_scene('echo_valley', [
              obj('echo_spawn_cliff','Cliff','western echo gate',10,0.3,0.8,1.5,-5),
              obj('echo_spawn_ruin','Ruin','western echo gate',20,1.4,0.6,1.1,20),
              obj('echo_spawn_banner','Banner','western echo gate',30,2.7,0.7,0.9,-12),
              obj('echo_spawn_watch','Watchtower','western echo gate',40,4.3,0.7,1.0,0),
              obj('echo_wall_a','Cliff','northern valley wall',100,9.8,1.0,1.4,8),
              obj('echo_wall_b','Rock','northern valley wall',110,10.0,3.2,1.1,0),
              obj('echo_wall_pine_a','Pine','northern valley wall',120,10.1,5.5,1.2,0),
              obj('echo_wall_pine_b','Pine','northern valley wall',130,10.0,7.8,1.0,0),
              obj('echo_signal_watch_a','Watchtower','central signal ridge',200,4.5,5.8,1.1,0),
              obj('echo_signal_watch_b','Watchtower','central signal ridge',210,6.5,6.0,1.0,0),
              obj('echo_signal_banner_a','Banner','central signal ridge',220,5.2,6.5,0.9,0),
              obj('echo_signal_banner_b','Banner','central signal ridge',230,7.2,6.3,0.8,0),
              obj('echo_signal_ruin','Ruin','central signal ridge',240,5.8,8.8,1.1,-22),
              obj('echo_south_cliff','Cliff','southern valley wall',300,0.7,9.8,1.5,-8),
              obj('echo_south_rock','Rock','southern valley wall',310,2.0,10.0,0.9,0),
              obj('echo_south_wagon','Wagon','southern valley wall',320,4.5,10.0,0.8,18),
              obj('echo_final_barricade','Barricade','citadel echo approach',330,6.0,10.0,0.9,0),
              obj('echo_final_banner','Banner','citadel echo approach',340,9.8,10.1,0.9,0),
          ])

          write_scene('last_citadel', [
              obj('citadel_outer_cliff_a','Cliff','outer fortress approach',10,0.2,0.2,1.6,0),
              obj('citadel_outer_cliff_b','Cliff','outer fortress approach',20,10.2,0.2,1.6,0),
              obj('citadel_outer_watch_a','Watchtower','outer fortress approach',30,2.0,0.5,1.2,0),
              obj('citadel_outer_watch_b','Watchtower','outer fortress approach',40,8.0,0.5,1.2,0),
              obj('citadel_outer_banner_a','Banner','outer fortress approach',50,3.2,0.6,0.9,0),
              obj('citadel_outer_banner_b','Banner','outer fortress approach',60,6.8,0.6,0.9,0),
              obj('citadel_first_ruin_a','Ruin','first fortification line',100,4.2,2.2,1.2,18),
              obj('citadel_first_ruin_b','Ruin','first fortification line',110,6.2,2.2,1.2,-18),
              obj('citadel_first_barricade_a','Barricade','first fortification line',120,4.0,4.2,1.0,0),
              obj('citadel_first_barricade_b','Barricade','first fortification line',130,7.0,4.2,1.0,0),
              obj('citadel_second_watch_a','Watchtower','second fortification line',200,1.0,6.5,1.1,0),
              obj('citadel_second_watch_b','Watchtower','second fortification line',210,9.8,6.5,1.1,0),
              obj('citadel_second_banner','Banner','second fortification line',220,5.5,6.5,0.9,0),
              obj('citadel_supply_wagon','Wagon','second fortification line',230,1.0,9.8,0.9,20),
              obj('citadel_final_ruin','Ruin','final monumental gate',300,5.5,9.8,1.4,0),
              obj('citadel_final_watch','Watchtower','final monumental gate',310,7.5,9.8,1.3,0),
              obj('citadel_final_rock','Rock','final monumental gate',320,9.8,9.8,1.1,0),
              obj('citadel_final_banner','Banner','final monumental gate',330,6.5,10.2,1.0,0),
          ])
          PY

          for id in tutorial flooded_road iron_ravine storm_ring ash_gate ruined_village stone_bridge echo_valley last_citadel portal_nexus; do
            python3 scripts/export_scene_art.py "assets/scenes/$id.scene.json" --output "romfs/scenes/$id.art"
          done

          python3 - <<'PY'
          from pathlib import Path

          makefile = Path('Makefile')
          text = makefile.read_text(encoding='utf-8')
          old = 'SCENE_IDS      := tutorial portal_nexus'
          new = 'SCENE_IDS      := tutorial flooded_road iron_ravine storm_ring ash_gate ruined_village stone_bridge echo_valley last_citadel portal_nexus'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one SCENE_IDS declaration, found {text.count(old)}')
          makefile.write_text(text.replace(old, new), encoding='utf-8')

          test = Path('tests/campaign_level_files_tests.cpp')
          text = test.read_text(encoding='utf-8')
          text = text.replace(
              'std::size_t validateScene(const std::string& root, const LevelData& level,\n    std::size_t minimumProps) {',
              'std::string validateScene(const std::string& root, const LevelData& level,\n    std::size_t minimumProps) {')
          text = text.replace(
              '    std::set<ScenePropType> landmarkTypes;\n    std::size_t propVertices = 0U;',
              '    std::set<ScenePropType> landmarkTypes;\n    std::ostringstream signature;\n    std::size_t propVertices = 0U;')
          text = text.replace(
              '        landmarkTypes.insert(prop.type);\n        propVertices += scenePropVertexBudget(prop.type);',
              "        landmarkTypes.insert(prop.type);\n        signature << scenePropTypeName(prop.type) << ':' << prop.gridX << ','\n                  << prop.gridZ << ',' << prop.scale << ',' << prop.rotationDegrees << ';';\n        propVertices += scenePropVertexBudget(prop.type);")
          text = text.replace('    return scene.art.propCount;\n}', '    return signature.str();\n}', 1)
          text = text.replace(
              '    std::set<std::string> layouts;\n    std::size_t largeMapCount = 0U;',
              '    std::set<std::string> layouts;\n    std::set<std::string> sceneSignatures;\n    std::size_t largeMapCount = 0U;')
          old_block = '''        if (result.level.id == "tutorial") validateScene(root, result.level, 18U);
        if (result.level.id == "portal_nexus") validatePortalNexus(result.level);
        if (isLargeCampaignMap(result.level.id)) {
            ++largeMapCount;
            expect(result.level.width == 16U && result.level.height == 16U,
                "large campaign map should use full 16x16 area: " + result.level.id);
            expect(result.level.pathLength >= 20U,
                "large campaign map should have a substantial route: " + result.level.id);
            expect(countTiles(result.level, TileType::BuildSpot) >= 10U,
                "large map should provide distributed build positions: " + result.level.id);
            validateScene(root, result.level, 18U);
        }
'''
          new_block = '''        const std::string sceneSignature = validateScene(root, result.level, 18U);
        expect(sceneSignatures.insert(sceneSignature).second,
            "each campaign map should have a unique scene composition: " + result.level.id);
        if (result.level.id == "portal_nexus") validatePortalNexus(result.level);
        if (isLargeCampaignMap(result.level.id)) {
            ++largeMapCount;
            expect(result.level.width == 16U && result.level.height == 16U,
                "large campaign map should use full 16x16 area: " + result.level.id);
            expect(result.level.pathLength >= 20U,
                "large campaign map should have a substantial route: " + result.level.id);
            expect(countTiles(result.level, TileType::BuildSpot) >= 10U,
                "large map should provide distributed build positions: " + result.level.id);
        }
'''
          if old_block not in text:
              raise SystemExit('Campaign scene validation block not found')
          test.write_text(text.replace(old_block, new_block), encoding='utf-8')

          py_test = Path('tests/test_scene_export.py')
          text = py_test.read_text(encoding='utf-8')
          marker = '\n\nif __name__ == "__main__":\n'
          addition = '''
    def test_all_campaign_scenes_are_source_backed_and_distinct(self) -> None:
        scene_ids = (
            "tutorial", "flooded_road", "iron_ravine", "storm_ring", "ash_gate",
            "ruined_village", "stone_bridge", "echo_valley", "last_citadel",
            "portal_nexus",
        )
        rendered: set[str] = set()
        for scene_id in scene_ids:
            source = ROOT / "assets" / "scenes" / f"{scene_id}.scene.json"
            output = ROOT / "romfs" / "scenes" / f"{scene_id}.art"
            payload = json.loads(source.read_text(encoding="utf-8"))
            self.assertEqual(payload["level"], scene_id)
            self.assertGreaterEqual(len(payload["objects"]), 18)
            self.assertGreaterEqual(len({item["type"] for item in payload["objects"]}), 5)
            self.assertGreaterEqual(len({item["group"] for item in payload["objects"]}), 3)
            generated = EXPORTER.render_scene(source)
            self.assertEqual(output.read_text(encoding="utf-8"), generated)
            self.assertNotIn(generated, rendered)
            rendered.add(generated)
'''
          if marker not in text:
              raise SystemExit('Python unittest insertion marker not found')
          py_test.write_text(text.replace(marker, '\n' + addition + marker), encoding='utf-8')

          licenses = Path('assets/LICENSES.md')
          text = licenses.read_text(encoding='utf-8')
          anchor = '| `storm_ring_layout` | level / scene transforms | grzegorz2047 | Project | projektowane od zera w repo | trasa pierścieniowa i centralne obserwatorium | `romfs/levels/storm_ring.lvl`, `romfs/scenes/storm_ring.art` |\n'
          rows = (
              '| `campaign_scene_sources` | scene transforms | grzegorz2047 | Project | `assets/scenes/*.scene.json` | deterministyczne kompozycje wszystkich map kampanii | `romfs/scenes/*.art` |\n'
              '| `ash_gate_layout` | scene transforms | grzegorz2047 | Project | projektowane od zera w repo | osmolona brama, popiół i połamane umocnienia | `assets/scenes/ash_gate.scene.json`, `romfs/scenes/ash_gate.art` |\n'
              '| `ruined_village_layout` | scene transforms | grzegorz2047 | Project | projektowane od zera w repo | zwarta zniszczona osada, wozy i centralny plac | `assets/scenes/ruined_village.scene.json`, `romfs/scenes/ruined_village.art` |\n'
              '| `stone_bridge_layout` | scene transforms | grzegorz2047 | Project | projektowane od zera w repo | urwiska i monumentalny kamienny most | `assets/scenes/stone_bridge.scene.json`, `romfs/scenes/stone_bridge.art` |\n'
              '| `echo_valley_layout` | scene transforms | grzegorz2047 | Project | projektowane od zera w repo | ściany doliny, drzewa i wieże sygnałowe | `assets/scenes/echo_valley.scene.json`, `romfs/scenes/echo_valley.art` |\n'
              '| `last_citadel_layout` | scene transforms | grzegorz2047 | Project | projektowane od zera w repo | dwie linie fortyfikacji i finałowa brama | `assets/scenes/last_citadel.scene.json`, `romfs/scenes/last_citadel.art` |\n'
          )
          if anchor not in text:
              raise SystemExit('License table anchor not found')
          licenses.write_text(text.replace(anchor, anchor + rows), encoding='utf-8')
          PY

          make test
          rm .github/workflows/issue-187-scenes.yml

      - name: Commit generated scenes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Makefile assets romfs/scenes tests .github/workflows/issue-187-scenes.yml
          git commit -m "art: decorate remaining campaign maps"
          git push origin HEAD:agent/issue-187-campaign-scenes
