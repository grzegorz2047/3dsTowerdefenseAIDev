name: Wave speed safety

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-issue-185:
    name: Apply issue 185 product patch
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-185-mission-pause' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-185-mission-pause
          fetch-depth: 0
      - name: Apply and commit
        shell: bash
        run: |
          set -euo pipefail
          if ! output=$(python3 scripts/apply_issue_185.py 2>&1); then
            gh pr comment 186 --repo "$GITHUB_REPOSITORY" --body "Transformer #185 zatrzymał się:\n\n\`\`\`text\n${output}\n\`\`\`"
            exit 1
          fi
          rm -f .issue-185-trigger
          git checkout origin/main -- .github/workflows/build.yml .github/workflows/wave-speed.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "gameplay: add deterministic mission pause"
          git push origin HEAD:agent/issue-185-mission-pause

  wave-speed:
    name: Wave speed tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile speed policy
        run: |
          mkdir -p build/wave-speed
          g++ -std=c++17 -O2 -Wall -Wextra -Werror -Iinclude \
            tests/wave_speed_tests.cpp -o build/wave-speed/tests
      - name: Verify 1x and explicit 2x timing
        run: build/wave-speed/tests
      - name: Verify runtime starts safely
        run: |
          grep -q "int speedMultiplier = 1;" source/main.cpp
          grep -q "speedMultiplier = speedMultiplier == 1 ? 2 : 1;" source/main.cpp
          grep -q '"TEMPO %dx"' source/UiRenderer.cpp
